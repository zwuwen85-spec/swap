# 服务器配置
server:
  port: 8080
  mode: debug  # debug/release

# MySQL配置
mysql:
  host: localhost
  port: 3306
  database: campus_swap
  username: root
  password: "1234"
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime: 3600  # 秒

# Redis配置
redis:
  host: localhost
  port: 6379
  password: ""
  db: 0
  pool_size: 50

# JWT配置
jwt:
  secret: "campus-swap-shop-secret-key-change-in-production"
  expire: 604800  # 7天（秒）

# 日志配置
log:
  level: debug  # debug/info/warn/error
  filename: logs/app.log
  max_size: 100  # MB
  max_backups: 3
  max_age: 28  # days

# 上传配置
upload:
  max_size: 5242880  # 5MB
  allowed_types: ["jpg", "jpeg", "png", "gif"]
  path: ./uploads
